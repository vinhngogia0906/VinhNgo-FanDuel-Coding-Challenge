name: CI

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_NOLOGO: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'

jobs:
  backend:
    name: Backend (build + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/FanDuelDepthChartEngine
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: |
          dotnet test --no-build --configuration Release \
            --logger "trx;LogFileName=test-results.trx" \
            --collect:"XPlat Code Coverage" \
            --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/TestResults/**'

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: '**/TestResults/**/coverage.cobertura.xml'

  ui:
    name: UI (build + lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/fanduel-depthchart-ui
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/fanduel-depthchart-ui/package-lock.json

      - name: Install
        run: npm ci

      - name: Type-check + build
        run: npm run build

      - name: Lint
        run: npm run lint

  component:
    name: UI component tests (Playwright CT)
    runs-on: ubuntu-latest
    needs: [ui]
    defaults:
      run:
        working-directory: src/fanduel-depthchart-ui
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/fanduel-depthchart-ui/package-lock.json

      - name: Install
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('src/fanduel-depthchart-ui/package-lock.json') }}

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run component tests
        run: npm run test:component

      - name: Upload component report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-component
          path: src/fanduel-depthchart-ui/playwright-report-ct
          retention-days: 7

  docker:
    name: Docker (build only)
    runs-on: ubuntu-latest
    needs: [backend, ui]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: ./src/FanDuelDepthChartEngine
          file: ./src/FanDuelDepthChartEngine/FanDuelDepthChartEngine.Api/Dockerfile
          push: false
          tags: fanduel/api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build UI image
        uses: docker/build-push-action@v6
        with:
          context: ./src/fanduel-depthchart-ui
          file: ./src/fanduel-depthchart-ui/Dockerfile
          push: false
          tags: fanduel/ui:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  e2e:
    name: UI E2E tests (Playwright)
    runs-on: ubuntu-latest
    needs: [backend, ui, docker]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/fanduel-depthchart-ui/package-lock.json

      - name: Install UI deps
        working-directory: src/fanduel-depthchart-ui
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('src/fanduel-depthchart-ui/package-lock.json') }}

      - name: Install Playwright Chromium
        working-directory: src/fanduel-depthchart-ui
        run: npx playwright install --with-deps chromium

      - name: Bring up the stack
        run: docker compose up --build -d

      - name: Wait for engine to be healthy
        run: |
          timeout 90 bash -c 'until curl -fsS http://localhost:5113/health > /dev/null; do sleep 2; done'

      - name: Wait for UI to respond
        run: |
          timeout 60 bash -c 'until curl -fsS http://localhost:5173/ > /dev/null; do sleep 2; done'

      - name: Run E2E tests
        working-directory: src/fanduel-depthchart-ui
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:5173
          E2E_API_BASE: http://localhost:5113/api/sports/nfl/teams/TB/depthchart
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-e2e
          path: src/fanduel-depthchart-ui/playwright-report
          retention-days: 7

      - name: Dump container logs on failure
        if: failure()
        run: |
          echo "=== engine logs ==="
          docker logs fanduel-depthchart-engine || true
          echo "=== ui logs ==="
          docker logs fanduel-depthchart-ui || true

      - name: Tear down stack
        if: always()
        run: docker compose down -v
