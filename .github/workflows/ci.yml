name: CI

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_NOLOGO: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'

jobs:
  backend:
    name: Backend (build + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/FanDuelDepthChartEngine
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: |
          dotnet test --no-build --configuration Release \
            --logger "trx;LogFileName=test-results.trx" \
            --collect:"XPlat Code Coverage" \
            --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/TestResults/**'

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: '**/TestResults/**/coverage.cobertura.xml'

  ui:
    name: UI (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/fanduel-depthchart-ui
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/fanduel-depthchart-ui/package-lock.json

      - name: Install
        run: npm ci

      - name: Type-check + build
        run: npm run build

      - name: Lint
        run: npm run lint

  docker:
    name: Docker (build only)
    runs-on: ubuntu-latest
    needs: [backend, ui]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: ./src/FanDuelDepthChartEngine
          file: ./src/FanDuelDepthChartEngine/FanDuelDepthChartEngine.Api/Dockerfile
          push: false
          tags: fanduel/api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build UI image
        uses: docker/build-push-action@v6
        with:
          context: ./src/fanduel-depthchart-ui
          file: ./src/fanduel-depthchart-ui/Dockerfile
          push: false
          tags: fanduel/ui:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max