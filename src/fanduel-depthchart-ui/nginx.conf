server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — any unknown path serves index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Tighter caching for hashed assets, no-cache for HTML
    location ~* \.(js|css|svg|png|jpg|webp|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}